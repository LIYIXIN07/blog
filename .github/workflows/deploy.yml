name: CI/CD

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      deploy:
        description: Deploy to production server after build
        required: false
        default: true
        type: boolean

concurrency:
  group: blog-ci-cd-${{ github.ref }}
  cancel-in-progress: true

env:
  SERVER_IP: '121.4.27.29'
  SSH_USER: 'root'
  REMOTE_HOME: '/home'
  REMOTE_FRONTEND_DIR: '/home/blogfront'
  REMOTE_ADMIN_DIR: '/home/blogadmin'
  REMOTE_BACKEND_JAR: '/home/blog-backend-1.0.0.jar'
  VITE_API_BASE_URL: 'http://121.4.27.29:8080/api'
  VITE_SITE_URL: 'http://121.4.27.29'

jobs:
  backend-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: blog-backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven
      - name: Run backend tests
        run: mvn -B test

  frontend-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Unit tests
        run: npm run test
      - name: Type check and build
        run: npm run build
        env:
          VITE_API_BASE_URL: ${{ env.VITE_API_BASE_URL }}
          VITE_SITE_URL: ${{ env.VITE_SITE_URL }}
      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps
      - name: E2E tests
        run: npm run test:e2e
        env:
          CI: true

  backend-build:
    needs: backend-test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: blog-backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven
      - name: Build backend jar
        run: mvn -B -DskipTests package
      - uses: actions/upload-artifact@v4
        with:
          name: blog-backend-jar
          path: blog-backend/target/blog-backend-*.jar
          retention-days: 7

  frontend-build:
    needs: frontend-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Build blog frontend
        run: npm run build
        env:
          VITE_API_BASE_URL: ${{ env.VITE_API_BASE_URL }}
          VITE_SITE_URL: ${{ env.VITE_SITE_URL }}
      - uses: actions/upload-artifact@v4
        with:
          name: blog-frontend-dist
          path: dist
          retention-days: 7

  admin-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: blog-admin
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: blog-admin/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Build admin frontend
        run: npm run build
        env:
          VITE_API_BASE_URL: ${{ env.VITE_API_BASE_URL }}
      - uses: actions/upload-artifact@v4
        with:
          name: blog-admin-dist
          path: blog-admin/dist
          retention-days: 7

  deploy:
    name: CD - Deploy to Baota server
    needs: [backend-build, frontend-build, admin-build]
    if: |
      needs.backend-build.result == 'success' &&
      needs.frontend-build.result == 'success' &&
      needs.admin-build.result == 'success' &&
      (
        (github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')) ||
        (github.event_name == 'workflow_dispatch' && inputs.deploy)
      )
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Download backend artifact
        uses: actions/download-artifact@v4
        with:
          name: blog-backend-jar
          path: artifacts/backend

      - name: Download blog frontend artifact
        uses: actions/download-artifact@v4
        with:
          name: blog-frontend-dist
          path: artifacts/blogfront

      - name: Download admin frontend artifact
        uses: actions/download-artifact@v4
        with:
          name: blog-admin-dist
          path: artifacts/blogadmin

      - name: Upload blog frontend to /home/blogfront
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ env.SERVER_IP }}
          username: ${{ env.SSH_USER }}
          key: ${{ secrets.SH_PRIVATE_KEY }}
          source: 'artifacts/blogfront/*'
          target: ${{ env.REMOTE_FRONTEND_DIR }}
          strip_components: 2
          overwrite: true
          rm: true

      - name: Upload admin frontend to /home/blogadmin
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ env.SERVER_IP }}
          username: ${{ env.SSH_USER }}
          key: ${{ secrets.SH_PRIVATE_KEY }}
          source: 'artifacts/blogadmin/*'
          target: ${{ env.REMOTE_ADMIN_DIR }}
          strip_components: 2
          overwrite: true
          rm: true

      - name: Upload backend jar to /home
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ env.SERVER_IP }}
          username: ${{ env.SSH_USER }}
          key: ${{ secrets.SH_PRIVATE_KEY }}
          source: 'artifacts/backend/blog-backend-*.jar'
          target: ${{ env.REMOTE_HOME }}
          strip_components: 2
          overwrite: true

      - name: Upload restart script
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ env.SERVER_IP }}
          username: ${{ env.SSH_USER }}
          key: ${{ secrets.SH_PRIVATE_KEY }}
          source: 'scripts/restart-backend.sh'
          target: ${{ env.REMOTE_HOME }}
          overwrite: true

      - name: Restart backend service
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ env.SERVER_IP }}
          username: ${{ env.SSH_USER }}
          key: ${{ secrets.SH_PRIVATE_KEY }}
          script: |
            chmod +x ${{ env.REMOTE_HOME }}/restart-backend.sh
            bash ${{ env.REMOTE_HOME }}/restart-backend.sh
